<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <title>Mantenimiento de usuarios</title>
    </head>
    <body>
        <h1> Listado de Usuarios. </h1>
        <br/>

        <table class="table mx-2">
            <thead>
                <tr class="table-primary">
                    <th>Usuario</th>
                    <th>Clave</th>
                    <th>Nombre completo</th>
                    <th>Foto</th>
                    <th colspan="2">Accion</th>
                </tr>
            </thead>
            <tbody>
                    <tr th:each="user: ${lista}">
                        <td th:text="${user.usuario}"></td>
                        <td th:text="${user.clave}"></td>
                        <td th:text="${user.nombreCompleto}"></td>
                        <td><a th:href="@{'fotoMostrar?codigoUsuario='+${user.usuario}}">foto</a></td>
                        <!--
                        <td> <a href="usuarioEliminar?id=<%= usuario.getId() %>" >Eliminar</a> </td>
                        <td> <a href="usuarioActualizar">Actualizar</a> </td>
                        -->
                    </tr>
            </tbody>
        </table>
        <a th:href="@{'usuarioCrear'}" class="btn btn-primary btn-lg active mx-2">Crear Usuario</a>
    </body>
</html>
