<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Busqueda de Cursos</title>
</head>
<body>
<h1> Busqueda de Cursos </h1>

<form th:action="@{cursoBusqueda}" method="post">
    <table class="table">
        <thead class="table-primary">
            <tr>
                <th>Condición</th>
                <th>Valor</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>
                    <input type="radio" name="tipo" value="estado" required="true" />
                </td>
                <td>
                    <select name="estado">
                        <option value="0">CREADO</option>
                        <option value="1">EN PROCESO DE VENTA</option>
                        <option value="2">COMPLETO</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><input type="radio" name="tipo" value="incompleto"/>Incompleto</td>
            </tr>
            <tr>
                <td><input type="radio" name="tipo" value="porfecha"/>Por fecha:</td>
                <td><input type="date" name="fecha"/></td>
            </tr>
            <tr>
                <td><input type="radio" name="tipo" value="faltante"/>Alumnos faltantes:</td>
                <td><input type="number" name="numero"/></td>
            </tr>
            <tr>
                <td><input type="radio" name="tipo" value="nombre"/>Por nombre:</td>
                <td><input type="text" name="cadena"/></td>
            </tr>
            <tr>
                <td><input type="submit" value="Consultar" class="btn btn-primary"/></td>
            </tr>
        </tbody>
    </table>
</form>
    <br/>
    <div th:if="${lista!=null}">
        <table class="table">
            <thead class="table-secondary">
                <tr>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>Fecha inicio</th>
                    <th>Minimo alumnos</th>
                    <th>Inscritos</th>
                    <th>Estados</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="curso : ${lista}">
                    <td th:text="${curso.idCurso}"></td>
                    <td th:text="${curso.nomCurso}"></td>
                    <td th:text="${#dates.format(curso.fechaInicio,'dd/MM/yyyy')}"></td>
                    <td th:text="${curso.alumnosMin}"></td>
                    <td th:text="${curso.alumnosAct}"></td>
                    <td th:text="${curso.estado}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
